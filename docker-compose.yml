services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-marketplace}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-marketplace}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
    ports:
      - "5432:5432"

  migrate:
    build: .
    user: "0:0"
    entrypoint: ["/bin/bash", "/app/scripts/entrypoint-migrate.sh"]
    command: ["true"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-marketplace}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-marketplace}
      MIGRATION_LOCK_KEY: ${MIGRATION_LOCK_KEY:-83472931}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: .
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--timeout-graceful-shutdown",
        "30",
      ]
    stop_grace_period: 35s
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-marketplace}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      DEBUG: ${DEBUG:-false}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      ALLOW_LOCAL_STORAGE_FALLBACK: ${ALLOW_LOCAL_STORAGE_FALLBACK:-true}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_KEY: ${SUPABASE_KEY:-}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-reports}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      UPLOADS_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 768M
    expose:
      - "8000"
    restart: unless-stopped

  orchestrator:
    build: .
    command: ["python", "-m", "app.runtime.orchestration_worker"]
    stop_grace_period: 120s
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-marketplace}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ORCHESTRATOR_ENABLED: ${ORCHESTRATOR_ENABLED:-true}
      ORCHESTRATOR_POLL_INTERVAL_SECONDS: ${ORCHESTRATOR_POLL_INTERVAL_SECONDS:-5}
      ORCHESTRATOR_MAX_DISPATCH_PER_CYCLE: ${ORCHESTRATOR_MAX_DISPATCH_PER_CYCLE:-1}
    depends_on:
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M
    restart: unless-stopped

  worker:
    build: .
    command: ["python", "-m", "app.etl.worker"]
    stop_grace_period: 60s
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-marketplace}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      ALLOW_LOCAL_STORAGE_FALLBACK: ${ALLOW_LOCAL_STORAGE_FALLBACK:-true}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_KEY: ${SUPABASE_KEY:-}
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-reports}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      JOB_VISIBILITY_TIMEOUT_SECONDS: ${JOB_VISIBILITY_TIMEOUT_SECONDS:-1800}
      JOB_MAX_ATTEMPTS: ${JOB_MAX_ATTEMPTS:-3}
      UPLOADS_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "/app/scripts/worker-healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1024M
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
