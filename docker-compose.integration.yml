services:
  postgres_integration:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marketplace_test
    ports:
      - "5434:5432"
    volumes:
      - postgres_integration_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d marketplace_test"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate_integration:
    build: .
    user: "0:0"
    entrypoint: ["/bin/bash", "/app/scripts/entrypoint-migrate.sh"]
    command: ["true"]
    env_file:
      - .env.integration
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres_integration:5432/marketplace_test
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5434/marketplace_test
      SECRET_KEY: test-secret-key
      STORAGE_BACKEND: local
      ALLOW_LOCAL_STORAGE_FALLBACK: "true"
      AI_PROVIDER: mock
      MIGRATION_LOCK_KEY: 83472939
      POSTGRES_HOST: postgres_integration
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_DB: marketplace_test
    depends_on:
      postgres_integration:
        condition: service_healthy
    restart: "no"

  api_integration:
    build: .
    command: [
      "uvicorn", "app.main:app",
      "--host", "0.0.0.0",
      "--port", "8001",
      "--timeout-graceful-shutdown", "30"
    ]
    env_file:
      - .env.integration
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres_integration:5432/marketplace_test
      SECRET_KEY: test-secret-key
      DEBUG: "false"
      STORAGE_BACKEND: local
      ALLOW_LOCAL_STORAGE_FALLBACK: "true"
      SUPABASE_STORAGE_BUCKET: reports-test
      LOG_LEVEL: INFO
      AI_PROVIDER: mock
      UPLOADS_DIR: /app/uploads
    volumes:
      - uploads_integration_data:/app/uploads
    depends_on:
      migrate_integration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  worker_integration:
    build: .
    command: ["python", "-m", "app.etl.worker"]
    env_file:
      - .env.integration
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres_integration:5432/marketplace_test
      SECRET_KEY: test-secret-key
      STORAGE_BACKEND: local
      ALLOW_LOCAL_STORAGE_FALLBACK: "true"
      SUPABASE_STORAGE_BUCKET: reports-test
      LOG_LEVEL: INFO
      AI_PROVIDER: mock
      UPLOADS_DIR: /app/uploads
      JOB_VISIBILITY_TIMEOUT_SECONDS: "1800"
      JOB_MAX_ATTEMPTS: "3"
    volumes:
      - uploads_integration_data:/app/uploads
    depends_on:
      api_integration:
        condition: service_healthy
    restart: unless-stopped

  frontend_integration:
    image: node:22-alpine
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8081
      VITE_API_PREFIX: /api/v1
      VITE_PRODUCT_MODE: demo
      VITE_LOCAL_ONLY_MODE: "true"
    command: ["sh", "-lc", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]
    ports:
      - "5173:5173"
    depends_on:
      api_integration:
        condition: service_healthy

  nginx_integration:
    image: nginx:1.27-alpine
    ports:
      - "8081:80"
    volumes:
      - ./docker/nginx.integration.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api_integration:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_integration_data:
  uploads_integration_data:

