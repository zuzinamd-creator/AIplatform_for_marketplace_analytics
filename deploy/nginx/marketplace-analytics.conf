# Marketplace Analytics — production nginx (HTTP→HTTPS, API proxy, rate limits).
# Domain: 321997.fornex.cloud (Fornex VPS reverse-DNS, A → server IP).

limit_req_zone $binary_remote_addr zone=auth_login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=auth_reset:10m rate=5r/m;

upstream marketplace_api {
    server 127.0.0.1:8000;
    keepalive 8;
}

# HTTP — ACME challenge + redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name 321997.fornex.cloud 31.172.73.127;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — application
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 321997.fornex.cloud 31.172.73.127;

    ssl_certificate /etc/letsencrypt/live/321997.fornex.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/321997.fornex.cloud/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50m;
    client_body_buffer_size 128k;

    root /var/www/marketplace-analytics;
    index index.html;

    location = /health {
        proxy_pass http://marketplace_api;
        include /etc/nginx/snippets/marketplace-proxy.conf;
    }

    location = /health/ready {
        proxy_pass http://marketplace_api;
        include /etc/nginx/snippets/marketplace-proxy.conf;
    }

    # Auth rate limits (P1)
    location = /api/v1/auth/login {
        limit_req zone=auth_login burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://marketplace_api;
        include /etc/nginx/snippets/marketplace-proxy.conf;
    }

    location = /api/v1/auth/forgot-password {
        limit_req zone=auth_reset burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://marketplace_api;
        include /etc/nginx/snippets/marketplace-proxy.conf;
    }

    location = /api/v1/auth/reset-password {
        limit_req zone=auth_reset burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://marketplace_api;
        include /etc/nginx/snippets/marketplace-proxy.conf;
    }

    location /api/ {
        proxy_pass http://marketplace_api;
        include /etc/nginx/snippets/marketplace-proxy.conf;
    }

    location /docs {
        proxy_pass http://marketplace_api/docs;
        include /etc/nginx/snippets/marketplace-proxy.conf;
    }

    location /openapi.json {
        proxy_pass http://marketplace_api/openapi.json;
        include /etc/nginx/snippets/marketplace-proxy.conf;
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
        include /etc/nginx/snippets/marketplace-security-headers.conf;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        include /etc/nginx/snippets/marketplace-security-headers.conf;
        try_files /index.html =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        include /etc/nginx/snippets/marketplace-security-headers.conf;
        try_files $uri $uri/ /index.html;
    }
}
