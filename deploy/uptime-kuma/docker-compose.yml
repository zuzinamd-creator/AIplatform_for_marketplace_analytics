# Uptime Kuma — minimal external monitoring for MVP
# Binds localhost:3001 only; configure monitors via web UI after first start.

services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: marketplace-uptime-kuma
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - uptime_kuma_data:/app/data
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  uptime_kuma_data:
