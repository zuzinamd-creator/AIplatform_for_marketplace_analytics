name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: marketplace_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d marketplace_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/marketplace_test
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/marketplace_test
      SECRET_KEY: ci-secret-key
      RUN_INTEGRATION_TESTS: "true"
      ALLOW_LOCAL_STORAGE_FALLBACK: "true"
      STORAGE_BACKEND: local

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Architecture governance (light)
        run: python scripts/architecture_governance_check.py

      - name: Ruff
        run: ruff check app/core app/etl app/services app/schemas app/storage tests

      - name: Mypy
        run: >-
          mypy app/core/queue app/core/observability
          app/schemas/report_projection.py app/schemas/report_mappers.py
          app/services/report_service.py app/services/cost_service.py
          app/etl/worker.py app/etl/types.py app/etl/wb
          app/domain/finance app/domain/reconciliation app/domain/analytics

      - name: Alembic upgrade
        run: alembic upgrade head

      - name: Unit tests
        run: pytest tests/unit -q --cov=app --cov-report=term-missing

      - name: Integration tests
        run: pytest tests/integration -q -m integration

      - name: Docker Compose config
        run: docker compose config --quiet
